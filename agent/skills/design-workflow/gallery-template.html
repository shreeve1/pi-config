<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Gallery</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a1a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 40px 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 50px;
      text-align: center;
    }

    .header h1 {
      font-size: 32px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .header p {
      color: #999;
      font-size: 14px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }

    @media (min-width: 768px) {
      .gallery {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 767px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 480px) {
      .gallery {
        grid-template-columns: 1fr;
      }
    }

    .variant-card {
      background: #2a2a2a;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .variant-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.5);
    }

    .variant-preview {
      width: 100%;
      height: 200px;
      border-bottom: 1px solid #444;
      overflow: hidden;
    }

    .variant-preview iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .variant-info {
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .variant-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .variant-agent {
      font-size: 12px;
      color: #999;
      margin-bottom: 12px;
    }

    .variant-description {
      font-size: 13px;
      color: #ccc;
      line-height: 1.4;
      margin-bottom: 16px;
      flex: 1;
    }

    .variant-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-start;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-select {
      background: #0ea5e9;
      color: white;
      flex: 1;
    }

    .btn-select:hover {
      background: #0284c7;
    }

    .btn-view {
      background: #444;
      color: white;
    }

    .btn-view:hover {
      background: #555;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      overflow: auto;
      padding: 40px 20px;
    }

    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: #2a2a2a;
      border-radius: 8px;
      max-width: 90vw;
      max-height: 90vh;
      overflow: auto;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      padding: 20px;
      border-bottom: 1px solid #444;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-size: 20px;
    }

    .modal-close {
      background: none;
      border: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      background: #444;
      border-radius: 4px;
    }

    .modal-body {
      padding: 20px;
      overflow: auto;
      flex: 1;
    }

    .modal-footer {
      padding: 20px;
      border-top: 1px solid #444;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .source-code {
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 16px;
      margin-top: 16px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #aaa;
      overflow-x: auto;
    }

    .source-code pre {
      margin: 0;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #0ea5e9;
      margin-top: 16px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Design Variants</h1>
      <p>Select a design variant to implement</p>
    </div>

    <div class="gallery" id="gallery"></div>
  </div>

  <!-- Modal for expanded view -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle"></h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div id="modalPreview"></div>
        <div class="section-title">Source Code</div>
        <div class="source-code">
          <pre id="sourceCode"></pre>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-select" onclick="selectVariant()">Select This Design</button>
      </div>
    </div>
  </div>

  <script>
    let currentVariant = null;
    const galleryData = window.GALLERY_DATA || [];

    function renderGallery() {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';

      galleryData.forEach((variant, index) => {
        const card = document.createElement('div');
        card.className = 'variant-card';
        card.innerHTML = `
          <div class="variant-preview">
            <iframe src="${variant.previewUrl}" title="${variant.name}"></iframe>
          </div>
          <div class="variant-info">
            <div class="variant-name">${variant.name}</div>
            ${variant.agent ? `<div class="variant-agent">by ${variant.agent}</div>` : ''}
            <div class="variant-description">${variant.description}</div>
            <div class="variant-actions">
              <button class="btn btn-select" onclick="selectVariantCard(${index})">Select</button>
              <button class="btn btn-view" onclick="viewVariant(${index})">View Full</button>
            </div>
          </div>
        `;
        gallery.appendChild(card);
      });
    }

    function viewVariant(index) {
      const variant = galleryData[index];
      currentVariant = index;

      document.getElementById('modalTitle').textContent = variant.name;
      document.getElementById('modalPreview').innerHTML = `
        <h3 style="margin-bottom: 12px;">Preview</h3>
        <iframe src="${variant.previewUrl}" style="width: 100%; height: 400px; border: 1px solid #444; border-radius: 4px;"></iframe>
      `;

      fetch(variant.sourceUrl)
        .then(r => r.text())
        .then(code => {
          document.getElementById('sourceCode').textContent = code;
        })
        .catch(err => {
          document.getElementById('sourceCode').textContent = 'Failed to load source code';
        });

      document.getElementById('modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      currentVariant = null;
    }

    function selectVariantCard(index) {
      selectVariant(index);
    }

    function selectVariant(index) {
      if (index !== undefined) {
        currentVariant = index;
      }

      if (currentVariant === null || currentVariant === undefined) {
        alert('No variant selected');
        return;
      }

      const variant = galleryData[currentVariant];
      const selection = {
        selectedVariant: variant.name,
        selectedAgent: variant.agent || 'token-theme',
        timestamp: new Date().toISOString(),
        description: variant.description,
        sourceUrl: variant.sourceUrl,
        previewUrl: variant.previewUrl
      };

      const filename = 'selection.json';
      const dataStr = JSON.stringify(selection, null, 2);
      const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);

      const exportFileDefaultName = filename;

      const linkElement = document.createElement('a');
      linkElement.setAttribute('href', dataUri);
      linkElement.setAttribute('download', exportFileDefaultName);
      linkElement.click();

      alert(`Selected: ${variant.name}. selection.json has been saved.`);
      closeModal();
    }

    function initGallery(data) {
      window.GALLERY_DATA = data;
      renderGallery();
    }

    // Load gallery data from JSON
    fetch('gallery-data.json')
      .then(r => r.json())
      .then(data => initGallery(data))
      .catch(err => {
        console.error('Failed to load gallery data:', err);
        document.querySelector('.header p').textContent = 'Failed to load gallery data';
      });

    // Close modal on background click
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') {
        closeModal();
      }
    });
  </script>
</body>
</html>
