# See SKILL.md in this directory for detailed instructions
version: "1.0.0"
title: "Create Pi Skill"
description: "Create, update, or upgrade pi skills with mandatory SKILL.md and recipe.yaml artifacts."

parameters:
  - key: "skill-name"
    type: "string"
    required: true
    description: "Kebab-case name for the skill (must match directory name)"

  - key: "skill-purpose"
    type: "string"
    required: true
    description: "What the skill enables the model to do — used to derive description"

  - key: "scope"
    type: "select"
    required: true
    options: ["global", "project"]
    description: "Where to install: global (~/.pi/agent/skills/) or project (.pi/skills/)"

  - key: "mode"
    type: "select"
    required: true
    options: ["new", "update", "strictify", "convert"]
    description: "Whether creating from scratch, updating existing, upgrading to strict format, or converting from another system"

  - key: "testing-approach"
    type: "select"
    required: false
    default: "test-loop"
    options: ["test-loop", "human-review"]
    description: "Whether to run automated test comparisons (Phase 6) or skip to human review"

  - key: "source-path"
    type: "file"
    required: false
    default: ""
    description: "Path to existing skill or external file to update/convert (required for update/strictify/convert modes)"

workflow:
  - step: 1
    name: "Capture intent"
    description: "Determine mode, purpose, trigger conditions, inputs, outputs, and scope. For strictify/convert, read the source file first."
    requires_input: ["mode", "skill-purpose", "scope", "source-path"]
    decision_point: true

  - step: 2
    name: "Design the skill"
    description: "Plan frontmatter, activation contract, workflow structure, tool plan, recipe parameters, and bundled resources."
    requires_input: ["skill-name", "skill-purpose"]
    decision_point: false

  - step: 3
    name: "Write the SKILL.md"
    description: "Write SKILL.md with phases, completion markers, checkpoints, and guardrails. Move overflow to references/."
    requires_input: ["skill-name", "scope"]
    produces: ["skill-md"]
    decision_point: false

  - step: 4
    name: "Write the recipe.yaml"
    description: "Extract recipe from SKILL.md: map phases to steps, identify parameters, outputs, and validation. Verify sync."
    produces: ["recipe-yaml"]
    decision_point: false

  - step: 5
    name: "Write bundled resources and verify"
    description: "Write any scripts/references/assets, read back files, run validation script, verify recipe-skill sync."
    produces: ["bundled-resources"]
    decision_point: false

  - step: 6
    name: "Test and iterate"
    description: "Create test cases, spawn subagents to test, evaluate outputs, check phase compliance, improve based on feedback."
    requires_input: ["testing-approach"]
    produces: ["test-results"]
    decision_point: true

  - step: 7
    name: "Optimize description"
    description: "Optional. Generate eval queries, test triggering accuracy, refine description for better triggering."
    decision_point: true

outputs:
  - id: "skill-md"
    description: "The SKILL.md file with frontmatter, phases, checkpoints, and guardrails"
    type: "file"
    pattern: "*/SKILL.md"
    required: true

  - id: "recipe-yaml"
    description: "The recipe.yaml execution contract"
    type: "file"
    pattern: "*/recipe.yaml"
    required: true

  - id: "bundled-resources"
    description: "Optional scripts, references, or assets bundled with the skill"
    type: "artifact"
    required: false

  - id: "test-results"
    description: "Test workspace with eval results and iteration summaries"
    type: "artifact"
    required: false

validation:
  - name: "SKILL.md has required frontmatter"
    type: "content"
    target: "skill-md"
    contains: ["name:", "description:"]

  - name: "SKILL.md has phase completion markers"
    type: "content"
    target: "skill-md"
    contains: ["[Phase"]

  - name: "SKILL.md has checkpoints"
    type: "content"
    target: "skill-md"
    contains: ["Checkpoint"]

  - name: "recipe.yaml is valid YAML"
    type: "shell"
    command: "python3 -c \"import yaml; yaml.safe_load(open('recipe.yaml'))\""

  - name: "Skill name matches directory"
    type: "shell"
    command: "test \"$(grep '^name:' SKILL.md | head -1 | sed 's/name: //')\" = \"$(basename \"$PWD\")\""
